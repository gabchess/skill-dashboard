<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Grimoire</title>
  <meta name="description" content="AI skill grimoire — find any skill and its trigger in under 5 seconds">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>&#x1F4D6;</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="header__brand">
        <span class="header__icon">&#x1F4D6;</span>
        <div>
          <h1 class="header__title">Agent Grimoire</h1>
          <span class="header__subtitle"><span id="skillCount"></span> skills &middot; agentlvlup.ai</span>
        </div>
      </div>
      <div class="header__meta">
        <span class="header__version">v2.0</span>
        <span id="currentDate"></span>
      </div>
    </header>

    <!-- Search -->
    <div class="search-wrapper">
      <span class="search-wrapper__icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <label for="searchInput" class="sr-only">Search skills, triggers, bundles</label>
      <input
        type="text"
        id="searchInput"
        class="search-bar"
        placeholder="Search skills..."
        autocomplete="off"
      >
      <kbd class="search-wrapper__kbd">Ctrl+K</kbd>
    </div>

    <!-- Stats Strip -->
    <div class="stats-strip" id="statsStrip"></div>

    <!-- Bundle Tabs -->
    <nav class="bundle-tabs" id="bundleTabs" role="tablist" aria-label="Skill bundles"></nav>

    <!-- Tier Filters -->
    <div class="tier-filters" id="tierFilters"></div>

    <!-- Legendary Spotlight -->
    <section class="legendary-spotlight" id="legendarySpotlight" aria-label="Legendary Skills">
      <h2 class="section-label section-label--gold">&#9733; Legendary Spotlight</h2>
      <div class="legendary-spotlight__scroll" id="legendaryList"></div>
    </section>

    <!-- Skills Grid -->
    <main>
      <div class="skills-grid" id="skillsGrid"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>Agent Grimoire &middot; agentlvlup.ai</span>
      <span>Built for AI skill orchestration</span>
    </footer>
  </div>

  <script src="skills-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
